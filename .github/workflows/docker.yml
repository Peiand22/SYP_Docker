name: Auto Build & Push Docker Image

# Trigger auf alle Pushes auf main
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Repository auschecken
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Java 21 installieren
      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      # 3️⃣ Maven Build (erzeugt target/*.jar)
      - name: Build with Maven
        run: mvn clean package

      # 4️⃣ Login bei GitHub Container Registry (GHCR)
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5️⃣ Docker-Image bauen
      - name: Build Docker image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/syp_backend:${{ github.sha }}
          docker build -t $IMAGE ./docker  # Dockerfile liegt im Unterordner 'docker'

      # 6️⃣ Docker-Image pushen
      - name: Push Docker image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/syp_backend:${{ github.sha }}
          docker push $IMAGE